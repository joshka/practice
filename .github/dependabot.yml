version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    versioning-strategy: increase-if-necessary
    groups:
      node-site-tooling:
        update-types:
          - patch
          - minor
        patterns:
          - "*"
      node-site-tooling-major:
        update-types:
          - major
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    groups:
      github-actions:
        update-types:
          - patch
          - minor
        patterns:
          - "*"
      github-actions-major:
        update-types:
          - major
        patterns:
          - "*"
